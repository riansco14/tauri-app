# .github/workflows/release.yml
# Pipeline só windows zipado
name: publish
on:
  workflow_dispatch
jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm install

      - name: Build Tauri
        run: npm run tauri build

      - name: Zip exe
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "src-tauri/target/release/bundle/msi/*.exe" `
            -DestinationPath "app-windows.zip"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: app-windows.zip


